name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # Reads the existing GitHub Pages config and sets up the env vars
        # the deploy step needs. Pages must already be enabled with
        # "Source: GitHub Actions" in the repo Settings → Pages tab
        # (one-time manual step; GITHUB_TOKEN cannot create the Pages
        # site itself — only a repo admin can).
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect base path
        id: basepath
        run: |
          # For project pages (USER.github.io/REPO), use /REPO as base path.
          # For user/org pages (USER.github.io) or custom domains served from root,
          # leave it empty. We detect by checking if a CNAME file exists.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [ -f public/CNAME ] || [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "Custom domain or user page → base_path is empty"
          else
            echo "base_path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
            echo "Project page → base_path is /$REPO_NAME"
          fi

      - name: Report which Mapbox secret is set (debug)
        env:
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          summarize() {
            local name=$1 val=$2
            if [ -z "$val" ]; then
              echo "  $name: UNSET"
            else
              echo "  $name: set (len=${#val}, prefix=${val:0:3})"
            fi
          }
          echo "Mapbox secret status:"
          summarize NEXT_PUBLIC_MAPBOX_TOKEN "$NEXT_PUBLIC_MAPBOX_TOKEN"
          summarize VITE_MAPBOX_KEY "$VITE_MAPBOX_KEY"
          summarize MAPBOX_TOKEN "$MAPBOX_TOKEN"

      - name: Build (with verified Mapbox token inline)
        # Resolves, exports, builds, AND verifies in one step. The export
        # lives in the same shell as `next build`, eliminating the
        # cross-step propagation question entirely. Then grep the built
        # bundle for a prefix of the token — if it's not there, fail
        # loudly so the broken bundle never ships.
        env:
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          # Resolve from any of the three names. After this line, the
          # canonical name is in scope for `next build`.
          export NEXT_PUBLIC_MAPBOX_TOKEN="${NEXT_PUBLIC_MAPBOX_TOKEN:-${VITE_MAPBOX_KEY:-${MAPBOX_TOKEN:-}}}"

          if [ -z "$NEXT_PUBLIC_MAPBOX_TOKEN" ]; then
            echo "::warning::No Mapbox token configured. /find will deploy the atlas fallback."
          else
            echo "Build env has NEXT_PUBLIC_MAPBOX_TOKEN (len=${#NEXT_PUBLIC_MAPBOX_TOKEN}, prefix=${NEXT_PUBLIC_MAPBOX_TOKEN:0:3})"
          fi

          npx next build

          # Verify the token actually got inlined into the build output.
          # We use the first 12 chars of the token as a fingerprint and
          # grep the JS chunks. If it's missing, the bundle is broken and
          # we should not ship.
          if [ -n "$NEXT_PUBLIC_MAPBOX_TOKEN" ]; then
            FINGERPRINT="${NEXT_PUBLIC_MAPBOX_TOKEN:0:12}"
            if grep -rqF "$FINGERPRINT" out/_next/static/chunks/ 2>/dev/null; then
              echo "✓ Mapbox token confirmed in built bundle"
            else
              echo "::error::Mapbox token did NOT land in out/_next/static/chunks/. The build is broken; aborting before deploy."
              exit 1
            fi
          fi

      - name: Regenerate /find map preview against the live Mapbox tiles
        # OPTIONAL — runs the homepage's /find screenshot against the live
        # Mapbox tiles so the marketing card stays in sync. The deploy must
        # NOT fail if this step has trouble (it depends on Playwright +
        # Chromium being available); the committed placeholder JPEG is good
        # enough on its own, and the live /find page is the real prize.
        continue-on-error: true
        env:
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          TOKEN="${NEXT_PUBLIC_MAPBOX_TOKEN:-${VITE_MAPBOX_KEY:-${MAPBOX_TOKEN:-}}}"
          if [ -z "$TOKEN" ]; then
            echo "No Mapbox token — skipping live screenshot; placeholder ships."
            exit 0
          fi
          # Install playwright + its bundled chromium so we don't depend on
          # the runner having a system Chrome at a particular path.
          npm install --no-save --no-audit --no-fund playwright@1.49.1 || {
            echo "playwright install failed — skipping screenshot."
            exit 0
          }
          npx playwright install --with-deps chromium || {
            echo "chromium install failed — skipping screenshot."
            exit 0
          }
          npx --yes http-server@14 out -p 3091 -s &
          HTTP_PID=$!
          sleep 3
          node scripts/screenshot-find-map.mjs \
            "http://localhost:3091${BASE_PATH}/find/" \
            out${BASE_PATH}/find-map-preview.jpg || {
            echo "Screenshot script failed — placeholder JPEG stays."
            kill $HTTP_PID || true
            exit 0
          }
          kill $HTTP_PID || true
          ls -lh out${BASE_PATH}/find-map-preview.jpg

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
