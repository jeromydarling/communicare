name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        # Reads the existing GitHub Pages config and sets up the env vars
        # the deploy step needs. Pages must already be enabled with
        # "Source: GitHub Actions" in the repo Settings → Pages tab
        # (one-time manual step; GITHUB_TOKEN cannot create the Pages
        # site itself — only a repo admin can).
        uses: actions/configure-pages@v5

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect base path
        id: basepath
        run: |
          # For project pages (USER.github.io/REPO), use /REPO as base path.
          # For user/org pages (USER.github.io) or custom domains served from root,
          # leave it empty. We detect by checking if a CNAME file exists.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [ -f public/CNAME ] || [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "Custom domain or user page → base_path is empty"
          else
            echo "base_path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
            echo "Project page → base_path is /$REPO_NAME"
          fi

      - name: Report which Mapbox secret is set (debug)
        # Prints a single line saying which (if any) of the Mapbox secret
        # names is configured in this repo. Doesn't leak the token — just
        # length + first three chars, enough to confirm "yes there is a
        # secret called VITE_MAPBOX_KEY that starts with pk." If all three
        # report "unset," the user needs to add the secret in
        # Settings → Secrets and variables → Actions.
        env:
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          summarize() {
            local name=$1 val=$2
            if [ -z "$val" ]; then
              echo "  $name: UNSET"
            else
              echo "  $name: set (len=${#val}, prefix=${val:0:3})"
            fi
          }
          echo "Mapbox secret status:"
          summarize NEXT_PUBLIC_MAPBOX_TOKEN "$NEXT_PUBLIC_MAPBOX_TOKEN"
          summarize VITE_MAPBOX_KEY "$VITE_MAPBOX_KEY"
          summarize MAPBOX_TOKEN "$MAPBOX_TOKEN"

      - name: Build
        env:
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          # The deploy commit SHA gets baked into the build so cache-busted
          # asset URLs (like the screencast video) can include it as a
          # query string — without changing the file path, which would
          # break HTML caching on the next push.
          NEXT_PUBLIC_BUILD_SHA: ${{ github.sha }}
          # Optional secrets — the site builds and runs fine without them
          # ("Demo mode" notices appear on /join, /come-in, /find, and the
          # homepage generator when their respective backend isn't wired).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          # Mapbox token — try all three common secret names. next.config.mjs
          # falls back through them and normalizes whichever is set to
          # NEXT_PUBLIC_MAPBOX_TOKEN inside the bundle.
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: npx next build

      - name: Regenerate /find map preview against the live Mapbox tiles
        # Replaces the placeholder atlas-mode screenshot at
        # public/find-map-preview.jpg with a real Mapbox render whenever a
        # token is available. Without a key, the existing placeholder
        # stays in place so the section still has something to show.
        env:
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ secrets.NEXT_PUBLIC_MAPBOX_TOKEN }}
          VITE_MAPBOX_KEY: ${{ secrets.VITE_MAPBOX_KEY }}
          MAPBOX_TOKEN: ${{ secrets.MAPBOX_TOKEN }}
        run: |
          TOKEN="${NEXT_PUBLIC_MAPBOX_TOKEN:-${VITE_MAPBOX_KEY:-${MAPBOX_TOKEN:-}}}"
          if [ -z "$TOKEN" ]; then
            echo "No Mapbox token in any of NEXT_PUBLIC_MAPBOX_TOKEN, VITE_MAPBOX_KEY, MAPBOX_TOKEN."
            echo "Skipping live screenshot; the placeholder atlas preview will be deployed."
            exit 0
          fi
          # Install playwright (the npm package only — the screenshot script
          # prefers the system Chrome that ubuntu-latest runners already
          # ship at /usr/bin/google-chrome, which saves a ~100 MB download).
          npm install --no-save --no-audit --no-fund playwright@1.49.1
          # Serve the static export at the right base path
          npx --yes http-server@14 out -p 3091 -s &
          HTTP_PID=$!
          sleep 3
          node scripts/screenshot-find-map.mjs \
            "http://localhost:3091${BASE_PATH}/find/" \
            out${BASE_PATH}/find-map-preview.jpg
          kill $HTTP_PID || true
          ls -lh out${BASE_PATH}/find-map-preview.jpg

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
