name: Deploy to Cloudflare

# Ship-it-always: every push to main builds the Next.js static export and
# deploys the Worker (which serves /api/* and the static assets together)
# via wrangler. Manual runs available from the Actions tab too.
#
# Required repo secrets (Settings → Secrets and variables → Actions):
#   - CLOUDFLARE_API_TOKEN   account-scoped token with Workers Scripts:Edit,
#                            Workers KV:Edit, D1:Edit, Account Settings:Read
#   - CLOUDFLARE_ACCOUNT_ID  account id (visible in any dashboard URL)
#
# Build-time public envs (Settings → Secrets and variables → Actions →
# Variables tab, NOT secrets):
#   - NEXT_PUBLIC_MAPBOX_TOKEN
#   - NEXT_PUBLIC_TURNSTILE_SITE_KEY

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    concurrency:
      group: cf-deploy-main
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          # Wrangler 4 requires Node ≥ 22.
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build static export
        env:
          NEXT_PUBLIC_MAPBOX_TOKEN: ${{ vars.NEXT_PUBLIC_MAPBOX_TOKEN }}
          NEXT_PUBLIC_TURNSTILE_SITE_KEY: ${{ vars.NEXT_PUBLIC_TURNSTILE_SITE_KEY }}
        run: npx next build

      # One-shot bootstrap: the original D1 schema was applied via raw
      # `d1 execute` (during MCP-driven provisioning), so the
      # d1_migrations tracking table never got populated. Without this,
      # wrangler thinks nothing's applied and tries to replay 0001 from
      # scratch — which errors out on already-existing indexes.
      # Idempotent (INSERT OR IGNORE) so it's safe to keep running.
      - name: Bootstrap d1_migrations history
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.97.0'
          command: >
            d1 execute communicare-db --remote --command
            "CREATE TABLE IF NOT EXISTS d1_migrations (id INTEGER PRIMARY KEY AUTOINCREMENT, name TEXT UNIQUE, applied_at DATETIME DEFAULT CURRENT_TIMESTAMP);
             INSERT OR IGNORE INTO d1_migrations (name) VALUES
              ('0001_initial_schema.sql'),
              ('0002_farm_discovery.sql'),
              ('0003_import_runs.sql'),
              ('0004_hortus_integration.sql'),
              ('0005_auth.sql'),
              ('0006_locale.sql');"

      # Apply any pending D1 migrations BEFORE deploying the Worker.
      # If a migration introduces a column the Worker reads, deploying
      # first would error until the migration lands. Idempotent: wrangler
      # tracks applied migrations in the d1_migrations table.
      - name: Apply D1 migrations
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          wranglerVersion: '4.97.0'
          command: d1 migrations apply communicare-db --remote

      - name: Deploy Worker
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          # Pin wrangler 4 — the action's default v3 can't read our
          # wrangler.jsonc (Workers Assets schema, send_email binding).
          wranglerVersion: '4.97.0'
          command: deploy
