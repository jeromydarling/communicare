name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Detect base path
        id: basepath
        run: |
          # For project pages (USER.github.io/REPO), use /REPO as base path.
          # For user/org pages (USER.github.io) or custom domains served from root,
          # leave it empty. We detect by checking if a CNAME file exists.
          REPO_NAME="${GITHUB_REPOSITORY##*/}"
          if [ -f public/CNAME ] || [[ "$REPO_NAME" == *.github.io ]]; then
            echo "base_path=" >> "$GITHUB_OUTPUT"
            echo "Custom domain or user page → base_path is empty"
          else
            echo "base_path=/$REPO_NAME" >> "$GITHUB_OUTPUT"
            echo "Project page → base_path is /$REPO_NAME"
          fi

      - name: Build
        env:
          BASE_PATH: ${{ steps.basepath.outputs.base_path }}
          # Optional — set as repo secrets to wire the live Supabase backend.
          # The site builds and runs fine without them ("Demo mode" notices
          # appear on /join, /come-in, and the homepage generator).
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        run: npx next build

      - name: Add .nojekyll
        run: touch out/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
