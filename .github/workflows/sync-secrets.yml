name: Sync Secrets to Supabase

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/sync-secrets.yml'  # re-run if workflow itself changes
  workflow_dispatch:  # run manually from GitHub Actions tab anytime

jobs:
  sync-secrets:
    runs-on: ubuntu-latest
    steps:
      - name: Install Supabase CLI
        run: |
          curl -sSL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin supabase
          supabase --version

      - name: Push secrets to Supabase
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase secrets set \
            --project-ref ${{ secrets.SUPABASE_PROJECT_REF }} \
            HORTUS_WEBHOOK_SECRET=${{ secrets.HORTUS_WEBHOOK_SECRET }} \
            HORTUS_WEBHOOK_URL=${{ secrets.HORTUS_WEBHOOK_URL }} \
            HORTUS_SUPABASE_URL=${{ secrets.HORTUS_SUPABASE_URL }} \
            HORTUS_SERVICE_ROLE_KEY=${{ secrets.HORTUS_SERVICE_ROLE_KEY }} \
            HORTUS_APP_URL=${{ secrets.HORTUS_APP_URL }} \
            GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }}

      - name: Set Postgres runtime config
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          psql "$DB_URL" <<'SQL'
            alter database postgres set app.hortus_webhook_url = '${{ secrets.HORTUS_WEBHOOK_URL }}';
            alter database postgres set app.hortus_webhook_secret = '${{ secrets.HORTUS_WEBHOOK_SECRET }}';
          SQL
