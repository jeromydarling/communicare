# Supabase local-dev config for Communicare.
# Run `supabase start` from the repo root to launch the local stack.
# Run `supabase db reset` to drop and recreate the database from migrations.

project_id = "communicare"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "https://jeromydarling.github.io/communicare",
  "http://localhost:3000",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
# Members sign in with magic links. Farms sign in with email+password OR Google
# OR magic link — see /farmer/come-in. Minimum length follows NIST guidance.
minimum_password_length = 12
# Require mixed case + a digit for farm operator passwords.
password_requirements = "lower_upper_letters_digits"

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
# Magic-link AND password reset templates both live here.
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

# Google OAuth — provider config lives in the Supabase dashboard (the Client
# ID / Client Secret are too sensitive for the config file). This block just
# turns it on locally; the dashboard still needs the credentials.
[auth.external.google]
enabled = true
# client_id = "env(GOOGLE_OAUTH_CLIENT_ID)"
# secret    = "env(GOOGLE_OAUTH_CLIENT_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"
skip_nonce_check = false

[auth.sms]
# Phone OTP fallback — wire to Twilio in the dashboard
enable_signup = false  # phone-only signup is off; SMS is for OTP into an existing email account
enable_confirmations = false
template = "Your Communicare code is {{ .Code }}"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Public demo function — anyone can call it; rate-limit at the gateway.
# Flip to verify_jwt = true once we want to gate it to authenticated users.
[functions.generate-homepage]
verify_jwt = false

# Twilio sends raw POSTs with X-Twilio-Signature headers, not Supabase JWTs.
# The function verifies the signature itself.
[functions.twilio-webhook]
verify_jwt = false

# Stripe webhooks ditto: signed via stripe-signature, not Supabase JWT.
# The onboard op IS gated to authenticated users in production (set to true
# once you're ready and front it with a Next.js Route Handler instead).
[functions.stripe-connect]
verify_jwt = false

[analytics]
enabled = false
