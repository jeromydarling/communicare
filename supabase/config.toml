# Supabase local-dev config for Communicare.
# Run `supabase start` from the repo root to launch the local stack.
# Run `supabase db reset` to drop and recreate the database from migrations.

project_id = "communicare"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false

[studio]
enabled = true
port = 54323
api_url = "http://127.0.0.1"

[inbucket]
enabled = true
port = 54324
smtp_port = 54325
pop3_port = 54326

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
additional_redirect_urls = [
  "https://jeromydarling.github.io/communicare",
  "http://localhost:3000",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
# We use magic links + SMS OTP. Passwords are disabled.
enable_anonymous_sign_ins = false
minimum_password_length = 16  # cosmetic; passwords are off

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = true
# Magic-link emails only — no password reset templates needed
max_frequency = "1m0s"
otp_length = 6
otp_expiry = 3600

[auth.sms]
# Phone OTP fallback — wire to Twilio in the dashboard
enable_signup = false  # phone-only signup is off; SMS is for OTP into an existing email account
enable_confirmations = false
template = "Your Communicare code is {{ .Code }}"

[edge_runtime]
enabled = true
policy = "oneshot"
inspector_port = 8083

# Public demo function — anyone can call it; rate-limit at the gateway.
# Flip to verify_jwt = true once we want to gate it to authenticated users.
[functions.generate-homepage]
verify_jwt = false

[analytics]
enabled = false
